
name: Checkmarx One Scan
on:
  push:
    branches:
      - feature/187
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Checkmarx One github Action
        uses: checkmarx/ast-github-action@main #Github Action version
        with:
          base_uri: https://sng.ast.checkmarx.net/
          cx_tenant: sng_partners
          cx_client_id: ${{ secrets.CX_CLIENT_ID }}
          cx_client_secret: AEz5mKiVvpDi0WY9C7Zp3ufLTIWkU3Hq
           # Select a Checkmarx Project Name
          project_name: ${{ github.repository }}
           # Branch name
          repo_name: ${{ github.event.repository.name }}
          # Organization name to create the Pr comment
          namespace:  ${{ github.repository_owner }}
          # Pr Number of the pull request that needs the decoration
          pr_number:  ${{ github.event.number }}
